# Lists tenant_id labels from events_reporting.conf for dashboard dropdowns.
# Includes enabled [tenant.*] stanzas and the legacy default [config] tenant when present.
[onepassword_configured_tenant_ids]
definition = rest splunk_server=local count=0 /servicesNS/nobody/onepassword_events_api/configs/conf-events_reporting \
| eval stanza=title \
| where stanza="config" OR like(stanza, "tenant.%") \
| eval enabled=coalesce(enabled, "true") \
| where stanza="config" OR NOT (enabled="false" OR enabled="0" OR enabled="FALSE") \
| eval tenant_id=case(stanza="config", coalesce(nullif(tenantId, ""), "default"), true(), coalesce(nullif(tenantId, ""), replace(stanza, "tenant.", ""))) \
| rex field=tenant_id mode=sed "s/\"//g" \
| where isnotnull(tenant_id) AND tenant_id!="" \
| where stanza!="config" OR isnotnull(limit) OR isnotnull(signInCursorFile) OR isnotnull(itemUsageCursorFile) OR isnotnull(auditEventsCursorFile) \
| dedup tenant_id \
| sort tenant_id \
| table tenant_id
