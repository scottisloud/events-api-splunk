# Lists tenant_id labels from events_reporting.conf for dashboard dropdowns.
# Includes enabled [tenant.*] stanzas and the legacy default [config] tenant when present.
# This is a generating search (starts with `rest`), so callers MUST invoke it with a
# leading pipe, e.g. `| `onepassword_configured_tenant_ids``. Without the leading pipe
# Splunk treats `rest ...` as literal search terms and the dropdown returns no results.
[onepassword_configured_tenant_ids]
# NOTE: keep this definition on a single line, and do NOT use an escaped quote
# (\") in the rex. An escaped quote does not survive macro expansion and the
# dropdown silently returns no results. tenantId is cleaned FIRST by stripping
# any character outside the valid tenant_id charset, which also removes the
# surrounding quotes Splunk stores for config values. This must happen before
# the nullif() check: the [config] stanza stores an unset tenantId as the quoted
# empty string ("" -> two literal quote chars), so cleaning has to run first for
# nullif(tenantId, "") to recognise it as empty and fall through to "default".
#
# The legacy default tenant lives in the [config] stanza, which is only shown
# when it actually carries settings. Splunk field names are case-sensitive and
# the [config] stanza is written with capitalized keys (Limit, SignInCursorFile,
# ...), while [tenant.*] stanzas may use lowercase, so config_settings coalesces
# both casings; otherwise the default tenant never matches and is dropped.
definition = rest splunk_server=local count=0 /servicesNS/nobody/onepassword_events_api/configs/conf-events_reporting | eval stanza=title | where stanza="config" OR like(stanza, "tenant.%") | eval enabled=coalesce(enabled, "true") | where stanza="config" OR NOT (enabled="false" OR enabled="0" OR enabled="FALSE") | rex field=tenantId mode=sed "s/[^a-zA-Z0-9_-]//g" | eval tenant_id=case(stanza="config", coalesce(nullif(tenantId, ""), "default"), true(), coalesce(nullif(tenantId, ""), replace(stanza, "tenant.", ""))) | rex field=tenant_id mode=sed "s/[^a-zA-Z0-9_-]//g" | where isnotnull(tenant_id) AND tenant_id!="" | eval config_settings=coalesce(Limit, limit, SignInCursorFile, signInCursorFile, ItemUsageCursorFile, itemUsageCursorFile, AuditEventsCursorFile, auditEventsCursorFile) | where stanza!="config" OR isnotnull(config_settings) | dedup tenant_id | sort tenant_id | table tenant_id
